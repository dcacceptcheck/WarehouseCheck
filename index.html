<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ตรวจสอบเกณฑ์การรับสินค้า</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero-card">
      <div class="hero-copy">
        <h1>ตรวจสอบเกณฑ์การรับสินค้า</h1>
        <p class="subtext">กรอกห้าง, สินค้า, วันที่ถึงลูกค้าปลายทาง แล้วระบบจะคำนวณวันผลิต (รหัสจ่ายได้ตั้งแต่วันที่)</p>
      </div>
      <img class="hero-image" src="assets/delivery-truck.png" alt="รถขนส่งสินค้า" />
    </header>

    <section class="form-card" aria-labelledby="filterTitle">
      <div class="section-title">
        <h2 id="filterTitle">ข้อมูลสำหรับตรวจสอบ</h2>
      </div>

      <div class="filter-stack">
        <label class="field">
          <span>ห้าง <strong>*</strong></span>
          <div class="combo" data-combo="mall">
            <input id="mallFilter" type="text" placeholder="กรุณาเลือก" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="mallList" required />
            <button class="combo-toggle" type="button" aria-label="เปิดรายการห้าง">⌄</button>
            <div id="mallList" class="combo-list" role="listbox"></div>
          </div>
        </label>

        <label class="field">
          <span>สินค้า <strong>*</strong></span>
          <select id="productFilter" required>
            <option value="">กรุณาเลือก</option>
          </select>
        </label>

        <label class="field">
          <span>วันที่ถึงลูกค้าปลายทาง <strong>*</strong></span>
          <div class="date-control">
            <input id="destinationDate" type="text" inputmode="numeric" maxlength="10" placeholder="วัน/เดือน/ปี" autocomplete="off" required />
            <span class="calendar-icon" aria-hidden="true">📅</span>
            <input id="destinationDatePicker" class="native-date" type="date" aria-label="เลือกวันที่ถึงลูกค้าปลายทาง" />
          </div>
        </label>

      </div>

      <p id="formMessage" class="form-message" aria-live="polite"></p>
    </section>

    <section id="resultSection" class="table-card is-hidden" aria-labelledby="resultTitle">
      <div class="table-header">
        <h2 id="resultTitle">ผลการตรวจสอบ</h2>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ห้าง</th>
              <th>สินค้า</th>
              <th>อายุสินค้า</th>
              <th>วันผลิต</th>
              <th>เกณฑ์รับสินค้า (วัน)</th>
              <th>วันที่ไม่เกินเกณฑ์ที่ลูกค้ายอมรับ</th>
              <th>วันที่ถึงลูกค้าปลายทาง</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
